name: Release

on:
  push:
    tags:
      - 'v*'

# Required by PyPI Trusted Publishing (OIDC).
permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ai-orchestrator-client
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip build twine
          pip install -e '.[dev]'

      - name: Lint + type-check + tests (final gate before publish)
        run: |
          ruff check .
          mypy
          pytest -q

      - name: Build sdist + wheel
        run: |
          python -m build
          twine check dist/*

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg="$(python -c "import importlib.metadata as m; print(m.version('ai-orchestrator-client'))")"
          if [ "$tag" != "$pkg" ]; then
            echo "tag $tag != package version $pkg" >&2
            exit 1
          fi

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
